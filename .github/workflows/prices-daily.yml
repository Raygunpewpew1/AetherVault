# Trimmed MTGJSON prices — daily so clients stay in sync with AllPricesToday without pulling the full zip.
# Publishes to a fixed rolling release (not "latest") so weekly MTG_App_DB releases stay the default.
name: Daily trimmed prices
on:
  schedule:
    # 14:30 UTC daily; adjust if MTGJSON publish time shifts
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-trimmed-prices:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # gh release needs a git checkout to resolve the target repository
      - uses: actions/checkout@v6

      - name: Build trimmed price database
        id: build_prices
        env:
          # MTGJSON returns 403 for generic Python-urllib / empty UA; match app-style identification.
          MTGJSON_UA: 'AetherVault/1.0 (GitHub Actions; +https://github.com/Raygunpewpew1/AetherVault)'
        run: |
          set -euo pipefail
          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          python3 <<'PY'
          import json
          import os
          import urllib.request

          url = "https://mtgjson.com/api/v5/Meta.json"
          ua = os.environ.get("MTGJSON_UA", "AetherVault/1.0")
          req = urllib.request.Request(url, headers={"User-Agent": ua})
          with urllib.request.urlopen(req, timeout=120) as r:
              j = json.load(r)
          data = j.get("data") or j.get("meta") or j
          date = (data.get("date") or "").strip()
          open("prices_bundle_meta.txt", "w", encoding="utf-8").write(date)
          print("prices_bundle_meta.txt:", repr(date))
          PY
          PRICE_ZIP=""
          for candidate in \
            "https://mtgjson.com/api/v5/AllPricesToday.sqlite.zip" \
            "https://mtgjson.com/api/v5/AllPrices.sqlite.zip"
          do
            echo "Attempting price download: $candidate"
            if curl -fL -A "$MTGJSON_UA" --retry 3 --retry-delay 5 -o mtg_prices_source.zip "$candidate"; then
              PRICE_ZIP="mtg_prices_source.zip"
              echo "Using price source: $candidate"
              break
            fi
            echo "Candidate unavailable: $candidate"
          done
          if [ -z "$PRICE_ZIP" ]; then
            echo "::warning::No MTGJSON price SQLite ZIP endpoint is currently available; skipping rolling prices publish."
            exit 0
          fi
          unzip -j -o "$PRICE_ZIP" -d .
          shopt -s nullglob
          srcs=(./*.sqlite)
          if [ "${#srcs[@]}" -ne 1 ]; then
            echo "::warning::Expected one .sqlite after unzip, found: ${#srcs[@]}; skipping rolling prices publish."
            ls -la
            rm -f "$PRICE_ZIP"
            exit 0
          fi
          SRC="${srcs[0]}"
          echo "Source DB: $SRC"
          sqlite3 AetherVault_Prices.sqlite <<SQLEOF
          ATTACH DATABASE '$SRC' AS src;
          CREATE TABLE prices AS
          SELECT uuid, source, provider, priceType, finish, currency, price
          FROM src.prices
          WHERE price IS NOT NULL AND price > 0
            AND lower(source) = 'paper'
            AND lower(provider) IN ('tcgplayer', 'cardmarket', 'cardkingdom', 'manapool')
            AND lower(priceType) = 'retail'
            AND lower(finish) IN ('normal', 'foil', 'etched');
          DETACH DATABASE src;
          SQLEOF
          zip -9 AetherVault_Prices.sqlite.zip AetherVault_Prices.sqlite
          rm -f "$PRICE_ZIP" "$SRC" AetherVault_Prices.sqlite
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish rolling prices release
        if: steps.build_prices.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=aethervault-prices-rolling
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" AetherVault_Prices.sqlite.zip prices_bundle_meta.txt --clobber
            gh release edit "$TAG" --notes "Daily trimmed MTGJSON prices (paper, retail, app vendors). Last run: $(date -u +%Y-%m-%dT%H:%MZ)."
          else
            gh release create "$TAG" AetherVault_Prices.sqlite.zip prices_bundle_meta.txt \
              --title "Rolling trimmed prices" \
              --notes "Daily trimmed MTGJSON prices. Card database uses dated releases (latest)." \
              --latest=false
          fi
